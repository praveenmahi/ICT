<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background-color:#f2f2f2;
}

h1{
    color:#333;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-gap:5px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:100px;
    height:100px;
    background:white;
    border:2px solid black;
    font-size:40px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.cell:hover{
    background:#e6e6e6;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
}
</style>

</head>

<body>

<h1>Tic Tac Toe Game</h1>

<div id="board">
<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>
<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>
<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>
</div>

<div id="status">Player X's Turn</div>

<button onclick="restart()">Restart Game</button>

<script>

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

let winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function play(cell,index){

if(board[index] != "" || !gameActive)
return;

board[index] = currentPlayer;
cell.innerHTML = currentPlayer;

checkWinner();

currentPlayer = currentPlayer === "X" ? "O" : "X";

document.getElementById("status").innerHTML = "Player " + currentPlayer + "'s Turn";

}

function checkWinner(){

for(let pattern of winPatterns){

let a = board[pattern[0]];
let b = board[pattern[1]];
let c = board[pattern[2]];

if(a && a === b && b === c){

document.getElementById("status").innerHTML = "Player " + a + " Wins!";
gameActive = false;
return;

}

}

if(!board.includes("")){

document.getElementById("status").innerHTML = "Game Draw!";
gameActive = false;

}

}

function restart(){

board = ["","","","","","","","",""];
gameActive = true;
currentPlayer = "X";

document.querySelectorAll(".cell").forEach(cell => cell.innerHTML="");

document.getElementById("status").innerHTML = "Player X's Turn";

}

</script>

</body>
</html>
